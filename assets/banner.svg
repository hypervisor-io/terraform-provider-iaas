<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-label="terraform-provider-iaas - Infrastructure as code for the Hypervisor.io IaaS platform">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1810"/>
      <stop offset="1" stop-color="#0f0c07"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb020"/>
      <stop offset="1" stop-color="#6fe3d8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ffb020" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffb020" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#ffb020" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <style>
      .mono { font-family: ui-monospace, "DejaVu Sans Mono", "SF Mono", Menlo, Consolas, monospace; }
      .sans { font-family: "DejaVu Sans", -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1280" height="360" rx="18" fill="url(#bg)"/>
  <rect width="1280" height="360" rx="18" fill="url(#grid)"/>
  <rect width="1280" height="360" rx="18" fill="url(#glow)"/>
  <rect width="1280" height="5" fill="url(#accent)"/>

  <!-- provider mark: rounded hexagon with a code caret -->
  <g transform="translate(72,124)">
    <path d="M66 4 L124 37 L124 103 L66 136 L8 103 L8 37 Z" fill="none" stroke="url(#accent)" stroke-width="3.5"/>
    <text x="66" y="88" text-anchor="middle" class="mono" font-size="50" font-weight="700" fill="#ffb020">&gt;_</text>
  </g>

  <!-- title -->
  <text x="238" y="158" class="mono" font-size="52" font-weight="700" fill="#fbf8ef" letter-spacing="-1">terraform-provider-iaas</text>

  <!-- tagline -->
  <text x="240" y="200" class="sans" font-size="23" fill="#cbc1a7">Infrastructure as code for the Hypervisor.io IaaS platform</text>

  <!-- meta line -->
  <text x="240" y="234" class="sans" font-size="16" fill="#8a8069">OpenTofu &amp; Terraform &#160;&#183;&#160; 56 resources and data sources &#160;&#183;&#160; one IP-locked API token</text>

  <!-- capability chips -->
  <g transform="translate(240,266)" class="mono" font-size="14.5" fill="#e9efee">
    <g fill="none" stroke="#6fe3d8" stroke-opacity="0.45">
      <rect x="0"   y="0" width="106" height="32" rx="16"/>
      <rect x="118" y="0" width="66"  height="32" rx="16"/>
      <rect x="196" y="0" width="120" height="32" rx="16"/>
      <rect x="328" y="0" width="112" height="32" rx="16"/>
      <rect x="452" y="0" width="152" height="32" rx="16"/>
      <rect x="616" y="0" width="94"  height="32" rx="16"/>
    </g>
    <text x="53"  y="21" text-anchor="middle" fill="#e9efee">Instances</text>
    <text x="151" y="21" text-anchor="middle" fill="#e9efee">VPC</text>
    <text x="256" y="21" text-anchor="middle" fill="#e9efee">Kubernetes</text>
    <text x="384" y="21" text-anchor="middle" fill="#e9efee">Databases</text>
    <text x="528" y="21" text-anchor="middle" fill="#e9efee">Load Balancers</text>
    <text x="663" y="21" text-anchor="middle" fill="#e9efee">Storage</text>
  </g>

  <!-- corner wordmark -->
  <text x="1216" y="326" text-anchor="end" class="mono" font-size="14" fill="#6fe3d8" fill-opacity="0.8">hypervisor.io</text>
</svg>
