name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build, Vet, Format, Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # 'stable' = latest patched Go (>= the go.mod floor). Builds with the
          # current stdlib so net/http, crypto/tls, crypto/x509 security fixes
          # are always picked up (provider security review T8).
          go-version: "stable"

      - name: go mod tidy is clean
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Check generated docs are up to date
        run: |
          go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@latest
          export PATH="$PATH:$(go env GOPATH)/bin"
          make docs
          git diff --exit-code docs/

  validate-stack:
    name: Validate composed example stack
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # 'stable' = latest patched Go (>= the go.mod floor). Builds with the
          # current stdlib so net/http, crypto/tls, crypto/x509 security fixes
          # are always picked up (provider security review T8).
          go-version: "stable"

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Build provider binary
        run: go build -o terraform-provider-iaas .

      - name: Write provider dev override
        run: |
          cat > "$RUNNER_TEMP/iaas-dev.tfrc" <<EOF
          provider_installation {
            dev_overrides { "hypervisor-io/iaas" = "$GITHUB_WORKSPACE" }
            direct {}
          }
          EOF

      - name: Validate examples/stacks/web-app
        working-directory: examples/stacks/web-app
        env:
          TF_CLI_CONFIG_FILE: ${{ runner.temp }}/iaas-dev.tfrc
        # NOTE: a dev override short-circuits `tofu init`, so we validate directly.
        # This proves the composed stack stays consistent with the provider schema.
        # We do NOT run apply - there is no live panel in CI.
        run: tofu validate
